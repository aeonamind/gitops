apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sound-bot.fullname" . }}
  labels:
    {{- include "sound-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "sound-bot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sound-bot.selectorLabels" . | nindent 8 }}
      annotations:
        vault.hashicorp.com/agent-inject: {{ .Values.vault.enabled | quote }}
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        {{- if .Values.vault.dockerConfigPath }}
        vault.hashicorp.com/agent-inject-secret-dockerconfig: {{ .Values.vault.dockerConfigPath | quote }}
        vault.hashicorp.com/agent-inject-template-dockerconfig: |
          {{`{{- with secret `}}{{ .Values.vault.dockerConfigPath | quote }}{{` -}}
          {{ .Data.data.config }}
          {{- end -}}`}}
        {{- end }}
        vault.hashicorp.com/agent-inject-secret-config: {{ .Values.vault.remotePath | quote }}
        vault.hashicorp.com/agent-inject-template-config: |
          {{`{{- with secret `}}{{ .Values.vault.remotePath | quote }}{{` -}}
          {{- range $k, $v := .Data.data }}
          export {{ $k }}="{{ $v }}"
          {{- end }}
          {{- end -}}`}}
    spec:
      serviceAccountName: {{ include "sound-bot.fullname" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: vault-init
          image: alpine/k8s:1.28.0
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
          command:
            - sh
            - -c
            - |
              set -e
              # Install vault (kubectl and jq are already in alpine/k8s)
              curl -LO https://releases.hashicorp.com/vault/1.15.4/vault_1.15.4_linux_amd64.zip
              unzip vault_1.15.4_linux_amd64.zip
              mv vault /usr/local/bin/
              rm vault_1.15.4_linux_amd64.zip

              echo "Authenticating with Vault..."
              JWT=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              
              # Attempt login and capture token
              VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role={{ .Values.vault.role | quote }} jwt=$JWT)
              if [ -z "$VAULT_TOKEN" ]; then
                echo "ERROR: Failed to authenticate with Vault. Ensure role {{ .Values.vault.role }} exists and allows service account {{ include "sound-bot.fullname" . }} in namespace {{ .Release.Namespace }}."
                exit 1
              fi
              export VAULT_TOKEN
              
              echo "Fetching DockerHub credentials from Vault path {{ .Values.vault.dockerConfigPath }}..."
              CREDS=$(vault kv get -format=json {{ .Values.vault.dockerConfigPath | quote }})
              
              DOCKER_CONFIG=$(echo "$CREDS" | jq -r '.data.data.config')
              
              if [ -n "$DOCKER_CONFIG" ] && [ "$DOCKER_CONFIG" != "null" ]; then
                echo "Creating/Updating imagePullSecret {{ (index .Values.image.pullSecrets 0).name }}..."
                echo "$DOCKER_CONFIG" > /tmp/config.json
                kubectl create secret generic {{ (index .Values.image.pullSecrets 0).name }} \
                  --from-file=.dockerconfigjson=/tmp/config.json \
                  --type=kubernetes.io/dockerconfigjson \
                  --dry-run=client -o yaml | kubectl apply -f -
                echo "Secret updated successfully."
              else
                echo "ERROR: Failed to extract 'config' from Vault response at {{ .Values.vault.dockerConfigPath }}."
                echo "Response received: $CREDS"
                exit 1
              fi
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | toString }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.vault.enabled }}
          command: ["/bin/sh", "-c"]
          args: ["source /vault/secrets/config && node dist/index.js"]
          {{- end }}
          ports:
            - name: http
              containerPort: 3000
          {{- if not .Values.vault.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- end }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
