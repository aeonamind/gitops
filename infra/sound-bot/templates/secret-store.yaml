apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  labels:
    {{- include "sound-bot.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: {{ .Values.vault.role | quote }}
          serviceAccountRef:
            name: {{ include "sound-bot.fullname" . }}
