apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ (index .Values.image.pullSecrets 0).name }}
  labels:
    {{- include "sound-bot.labels" . | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: {{ (index .Values.image.pullSecrets 0).name }}
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: "{{`{{ .dockerconfig }}`}}"
  data:
    - secretKey: dockerconfig
      remoteRef:
        key: {{ .Values.vault.dockerConfigPath | replace "secret/data/" "" | quote }}
        property: config
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "sound-bot.fullname" . }}-app-secrets
  labels:
    {{- include "sound-bot.labels" . | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: {{ include "sound-bot.fullname" . }}-app-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
  dataFrom:
  - extract:
      key: {{ .Values.vault.remotePath | replace "secret/data/" "" | quote }}
