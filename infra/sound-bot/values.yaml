# Optional: set to override generated resource names (default is release name).
# fullnameOverride: ""

# Image built by CI (see sound-bot repo). Pin a tag in prod instead of :latest.
image:
  repository: aeonamind/sound-bot
  tag: 343fe36bb04f419f85db27a46ab50fd33fc35fed
  pullPolicy: IfNotPresent
  pullSecrets:
    - name: dockerhub-secret
replicas: 1
service:
  type: ClusterIP
  port: 3000
# Vault External Secrets configuration.
# Prerequisites: apps/vault; then:
# 1) Init/unseal Vault, enable KV v2:  vault secrets enable -path=secret kv-v2
# 2) Store:  vault kv put secret/data/sound-bot BOT_TOKEN=... CLIENT_ID=...
# 3) Configure K8s Auth and Role in Vault (see instructions provided).
vault:
  enabled: true
  role: sound-bot-role
  remotePath: secret/data/sound-bot
  dockerConfigPath: secret/data/dockerhub
resources: {}
