# HashiCorp Vault (standalone file storage + PVC). After first sync: init, unseal,
# enable KV v2 at path "secret", write keys — see infra/sound-bot/values.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.28.0
    helm:
      releaseName: vault
      values: |
        global:
          enabled: true
        injector:
          enabled: true
        server:
          enabled: true
          standalone:
            enabled: true
            config: |
              ui = true
              listener "tcp" {
                address = "[::]:8200"
                cluster_address = "[::]:8201"
                tls_disable = "true"
              }
              storage "file" {
                path = "/vault/data"
              }
          dataStorage:
            enabled: true
            size: 10Gi
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
